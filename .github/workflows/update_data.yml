name: Hourly IMGW Data Update

on:
  schedule:
    - cron: '15 * * * *'  # Odpala siê automatycznie 15 minut po ka¿dej pe³nej godzinie
  workflow_dispatch:     # Pozwala te¿ uruchomiæ skrypt rêcznie jednym klikniêciem

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Wymuszenie Node.js 24 dla wszystkich akcji

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Sprawdzenie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja wymaganych bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Uruchomienie skryptu pobieraj¹cego dane IMGW
      run: python imgw_data.py

    - name: Automatyczny zapis zaktualizowanych danych do repozytorium
      run: |
        git config --global user.name "IMGW Data Bot"
        git config --global user.email "actions@github.com"
        
        # Sprawdzenie, czy plik geojson w ogóle zosta³ utworzony przez skrypt
        if [ -f "imgw_data.geojson" ]; then
          git add imgw_data.geojson
          
          # Bezpieczne sprawdzenie czy s¹ zmiany przed zrobieniem commit i push
          if ! git diff --cached --quiet; then
            git commit -m "Aktualizacja danych IMGW: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "Brak nowych zmian w danych."
          fi
        else
          echo "B£¥D KRYTYCZNY: Plik imgw_data.geojson nie zosta³ utworzony przez skrypt Pythona!"
          exit 1
        fi