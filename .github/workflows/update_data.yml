name: Hourly IMGW Data Update

on:
  schedule:
    # Odpala siê 15, 30 ORAZ 45 minut po ka¿dej pe³nej godzinie (wiêksza szansa na punktualnoæ)
    - cron: '15,30,45 * * * *'  
  workflow_dispatch:     # Pozwala te¿ uruchomiæ skrypt rêcznie jednym klikniêciem

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Sprawdzenie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja wymaganych bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Uruchomienie skryptu bazy danych IMGW
      run: python imgw_data.py

    - name: Automatyczny zapis bazy do repozytorium
      run: |
        git config --global user.name "IMGW Data Bot"
        git config --global user.email "actions@github.com"
        
        # Dodajemy ca³y folder bazy z plikami dziennymi json
        git add imgw_baza/
        
        # Commit i push zmian do repozytorium, o ile pojawi³y siê nowe dane hourly
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatyczna aktualizacja bazy dziennej IMGW [$(date)]" && git push)