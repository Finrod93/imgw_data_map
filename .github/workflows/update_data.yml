name: Hourly IMGW Data Update

on:
  schedule:
    - cron: '15,45 * * * *'  
  workflow_dispatch:     

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Sprawdzenie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja wymaganych bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests aiohttp tqdm python-dateutil tzdata

    - name: Uruchomienie skryptu bazy danych IMGW
      run: python imgw_data.py

    - name: Automatyczny zapis bazy do repozytorium
      run: |
        git config --global user.name "IMGW Data Bot"
        git config --global user.email "actions@github.com"
        
        if [ -f "imgw_baza.json" ]; then
          git add imgw_baza.json
          if ! git diff --cached --quiet; then
            git commit -m "Aktualizacja bazy godzinowej IMGW: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "Brak nowych danych do zapisania."
          fi
        else
          echo "B£¥D: Plik imgw_baza.json nie powsta³ podczas dzia³ania skryptu Pythona."
          exit 1
        fi