<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacje Meteorologiczne IMGW - Panel Kontrolny</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        /* Pełnoekranowy widok mapy */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        
        /* BAZOWY STYL ETYKIET: Ciasne, małe prostokąty z idealnie wyśrodkowaną czcionką 11px */
        .stacja-etykieta {
            background: rgba(255, 255, 255, 0.95) !important;
            border-radius: 2px !important;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15) !important;
            font-family: Arial, sans-serif !important;
            font-size: 11px !important;
            font-weight: bold !important;
            white-space: nowrap !important;
            
            /* Gwarancja doskonałego pozycjonowania w osiach X i Y */
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            text-align: center !important;
            
            /* Maksymalne odchudzenie ramek prostokąta */
            line-height: normal !important;
            padding: 0px 2px !important; 
        }

        /* PRECYZYJNE ZBLIŻENIE DO PUNKTÓW */
        /* Klasa dla etykiet wyświetlanych NAD punktem stacji */
        .etykieta-gora {
            margin-top: -5px !important; 
        }

        /* Klasa dla etykiet wyświetlanych POD punktem stacji */
        .etykieta-dol {
            margin-top: 5px !important; 
        }

        /* DYNAMICZNE KOLOROWANIE RAMKI ORAZ CZCIONKI WEDŁUG WYMAGAŃ */
        
        /* Tmax oraz Tmax_hour: Czerwona obwódka, tekst czarny */
        .temp-max, .temp-max-hour { 
            color: #000000 !important; 
            border: 1px solid #ea2027 !important; 
        }
        /* WYJĄTEK: Tylko najwyższa wartość Tmax / Tmax_hour w kraju otrzymuje czerwony tekst */
        .temp-max.najwyzsza-temp, .temp-max-hour.najwyzsza-temp { 
            color: #ea2027 !important; 
        }

        /* Tmin oraz Tmin_hour: Niebieska obwódka, tekst czarny */
        .temp-min, .temp-min-hour { 
            color: #000000 !important; 
            border: 1px solid #0652dd !important; 
        }
        /* WYJĄTEK: Tylko najniższa wartość Tmin / Tmin_hour w kraju otrzymuje niebieski tekst */
        .temp-min.najnizsza-temp, .temp-min-hour.najnizsza-temp { 
            color: #0652dd !important; 
        }

        /* Standardowe, cienkie obramowania dla pozostałych warstw */
        .temp-aktualna { color: #2c3e50; border: 1px solid #7f8c8d !important; }
        .temp-grunt { color: #6f1e51; border: 1px solid #9980fa !important; }
        .opad-dobowy { color: #1b8d4b; border: 1px solid #4cd137 !important; }
        .opad-10min { color: #009432; border: 1px solid #a3cb38 !important; }
        .wiatr-avg { color: #5758bb; border: 1px solid #9980fa !important; }
        .wiatr-max { color: #3c1361; border: 1px solid #52307c !important; }
        .wysokosc { color: #5d4037; border: 1px solid #8d6e63 !important; }
        .nazwa-stacji { color: #212121; border: 1px solid #b2bec3 !important; }

        /* Całkowite usunięcie strzałek / trójkątów pod etykietami */
        .leaflet-tooltip-top::before, 
        .leaflet-tooltip-bottom::before, 
        .leaflet-tooltip-left::before, 
        .leaflet-tooltip-right::before {
            display: none !important;
        }

        /* Styl dla czystego separatora i nagłówka sekcji w menu warstw */
        .leaflet-control-layers-separator {
            border-top: 1px solid #ddd;
            margin: 5px -10px 5px -10px;
        }
        .leaflet-menu-section-title {
            font-size: 11px;
            color: #555;
            font-weight: bold;
            padding: 2px 0;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="app.js"></script>
</body>
</html>
