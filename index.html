<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatyczna Mapa Pogodowa IMGW</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
            background-color: #b5d0d0;
        }

        /* 📅 Lekka, minimalistyczna oś czasu z kalendarzem */
        #timeline-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            min-width: 500px;
            background: rgba(255, 255, 255, 0.96);
            color: #111;
            padding: 8px 16px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            font-size: 12px;
            border: 1px solid #ccc;
        }

        .timeline-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #calendar-picker {
            border: 1px solid #ccc;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            background: #fff;
        }

        #hour-slider {
            width: 120px;
            cursor: pointer;
            accent-color: #222;
        }

        #current-time-label {
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            min-width: 42px;
            text-align: center;
        }

        .source-attribution {
            font-size: 10px;
            color: #666;
            border-left: 1px solid #ccc;
            padding-left: 10px;
            white-space: nowrap;
        }

        /* 🎚️ Panel przezroczystości podkładu z procentami */
        .opacity-control-panel {
            background: rgba(255, 255, 255, 0.96);
            padding: 8px 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 11px;
            font-weight: bold;
            color: #222;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ccc;
        }
        .opacity-control-panel input {
            cursor: pointer;
            accent-color: #222;
            width: 80px;
        }

        /* 🎨 Odwrócona pionowa legenda termiczna */
        .info.legend {
            background: rgba(255, 255, 255, 0.96);
            padding: 10px 14px;
            font-size: 11px;
            line-height: 16px;
            color: #222;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            font-weight: 600;
            border: 1px solid #ccc;
        }
        
        .info.legend h4 {
            margin: 0 0 6px 0;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1.5px solid #ddd;
            padding-bottom: 3px;
            color: #000;
            text-align: center;
        }

        .legend-row {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }

        .legend-color-box {
            width: 16px;
            height: 13px;
            margin-right: 8px;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 2px;
        }

        /* 🏷️ Oryginalne etykiety Felt/QGIS zawieszone bezpośrednio nad punktami */
        .gis-rect-label {
            background: none !important;
            border: none !important;
        }

        .gis-rect-box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #000000;
            padding: 2px 4px;
            border-radius: 3px;
            border: 1.2px solid #222222;
            box-shadow: 0 1.5px 4px rgba(0,0,0,0.35);
            text-align: center;
            white-space: nowrap;
            min-width: 38px;
            height: 18px;
            box-sizing: border-box;
        }

        /* 🟥/🟦 Grube ramki wyróżniające dla ekstremów krajowych danej godziny */
        .gis-rect-box.extreme-max {
            border: 2.5px solid #d32f2f !important;
            box-shadow: 0 0 6px rgba(211, 47, 47, 0.8);
        }

        .gis-rect-box.extreme-min {
            border: 2.5px solid #1976d2 !important;
            box-shadow: 0 0 6px rgba(25, 118, 210, 0.8);
        }

        /* Tabela w popupie stacji */
        .meteo-popup-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 5px;
        }
        .meteo-popup-table td {
            padding: 2px 4px;
            border-bottom: 1px solid #eee;
        }
        .meteo-popup-table tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="timeline-container">
        <div class="timeline-section">
            <label for="calendar-picker"><b>Dzień:</b></label>
            <input type="date" id="calendar-picker">
        </div>
        <div class="timeline-section" style="flex-grow: 1; justify-content: center;">
            <label for="hour-slider"><b>Godzina:</b></label>
            <input type="range" id="hour-slider" min="0" max="23" value="12">
            <span id="current-time-label">12:00</span>
        </div>
        <div class="source-attribution">
            Źródło danych: IMGW-PIB
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
