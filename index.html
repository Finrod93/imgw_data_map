<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatyczna Mapa Pogodowa IMGW</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
            background-color: #b5d0d0;
        }

        /* Nowoczesny i czysty panel osi czasu */
        #timeline-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.92);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.3px;
        }

        #current-time-label {
            color: #00ecff;
            background: rgba(0,0,0,0.5);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 236, 255, 0.2);
            font-variant-numeric: tabular-nums;
        }

        #date-picker {
            width: 100%;
            cursor: pointer;
            accent-color: #00ecff;
        }

        /* Panel kontroli przeźroczystości podkładu */
        .opacity-control-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-size: 12px;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .opacity-control-panel input {
            cursor: pointer;
            accent-color: #333;
        }

        /* Poprawna pionowa legenda (Ciepłe na górze) */
        .info.legend {
            background: rgba(255, 255, 255, 0.96);
            padding: 10px 14px;
            font-size: 11px;
            line-height: 16px;
            color: #222;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-weight: 600;
        }
        
        .info.legend h4 {
            margin: 0 0 6px 0;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1.5px solid #ddd;
            padding-bottom: 3px;
            color: #000;
            text-align: center;
        }

        .legend-row {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }

        .legend-color-box {
            width: 16px;
            height: 13px;
            margin-right: 8px;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: 2px;
        }

        /* Oryginalne etykiety Felt/QGIS zawieszone nad punktami */
        .gis-rect-label {
            background: none !important;
            border: none !important;
        }

        .gis-rect-box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #000000;
            padding: 2px 4px;
            border-radius: 3px;
            border: 1.2px solid #222222;
            box-shadow: 0 1.5px 4px rgba(0,0,0,0.35);
            text-align: center;
            white-space: nowrap;
            min-width: 38px;
            height: 18px;
            box-sizing: border-box;
        }

        /* 🔥 Specjalne obramowania dla najwyższych i najniższych wartości */
        .gis-rect-box.extreme-max {
            border: 2.5px solid #d32f2f !important;
            box-shadow: 0 0 6px rgba(211, 47, 47, 0.8);
        }

        .gis-rect-box.extreme-min {
            border: 2.5px solid #1976d2 !important;
            box-shadow: 0 0 6px rgba(25, 118, 210, 0.8);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="timeline-container">
        <div id="timeline-header">
            <span>Archiwum Danych Godzinowych IMGW</span>
            <span id="current-time-label">Wczytywanie osi czasu...</span>
        </div>
        <input type="range" id="date-picker" min="0" max="0" value="0">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
