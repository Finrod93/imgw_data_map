<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatyczna Mapa Pogodowa IMGW</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Mapa na pełen ekran */
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        /* Styl ciemnego panelu dolnego (Oś czasu i suwak) */
        #timeline-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(30, 30, 30, 0.9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
        }

        #current-time-label {
            color: #00ecff;
            background: rgba(0,0,0,0.3);
            padding: 3px 8px;
            border-radius: 4px;
        }

        #date-picker {
            width: 100%;
            cursor: pointer;
            accent-color: #00ecff;
        }

        /* Styl dla legendy Leafleta */
        .info.legend {
            background: white;
            padding: 10px;
            font-size: 12px;
            line-height: 18px;
            color: #333;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="timeline-container">
        <div id="timeline-header">
            <span>Archiwum danych godzinowych IMGW</span>
            <span id="current-time-label">Wczytywanie godziny...</span>
        </div>
        <input type="range" id="date-picker" min="0" max="0" value="0">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
